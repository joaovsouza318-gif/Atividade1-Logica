<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="questions.css">
</head>
<body>

    <div id="div-form">
        <h2>2. Faça um algoritmo que leia a largura e altura de uma
            parede, calcule e mostre a área a ser pintada e a
            quantidade de tinta necessária para o serviço. Considere
            que cada litro de tinta pinta uma área de 2metros
            quadrados.</h2>
        <hr>
        <form id="medidas">
            <label for="base">Largura</label>
            <input type="base" name="base" id="base">

            <label for="altura">Altura</label>
            <input type="altura" name="altura" id="altura">

            <div id="buttons">
                <button type="submit"> Confirmar</button>
                <button type="reset"> Limpar</button>
            </div>
        </form>

        <div id="div-resultado"></div>
    </div>
    <script src="q02.js"></script>
</body>
</html>
