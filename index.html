<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Atividades</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container{
            width: 500px;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1{
            color: #333;
            margin-bottom: 10px;
        }

        p{
            color: #666;
            margin-bottom: 25px;
        }

        hr{
            border: none;
            height: 2px;
            background: linear-gradient(to right, #74ebd5, #9face6);
            margin-bottom: 30px;
        }

        .botoes{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button{
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 10px;
            background: #6c63ff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #5548f0;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="container">
        <h1>Lista de Exercícios</h1>
        <p>Selecione uma questão para abrir</p>

        <hr>

        <div class="botoes">
            <button onclick="location.href='q01.html'">Questão 01</button>
            <button onclick="location.href='q02.html'">Questão 02</button>
            <button onclick="location.href='q03.html'">Questão 03</button>
            <button onclick="location.href='q04.html'">Questão 04</button>
            <button onclick="location.href='q05.html'">Questão 05</button>
            <button onclick="location.href='q06.html'">Questão 06</button>
        </div>
    </div>

</body>
</html>
