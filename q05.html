<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="questions.css">
</head>
<body>

    <div id="div-form">
        <h2>5. Escreva um programa que leia as medidas dos lados de um
            triângulo e escreva se ele é equilátero, isósceles ou
            escaleno. Sendo que Triângulo Equilátero possui os 3 lados iguais;Triângulo Isóscele possui 2 lados iguais; Triângulo Escaleno possui 3 lados diferentes</h2>
        <hr>
        <form id="lados">
            <label for="lado1">Primeiro Lado</label>
            <input type="number" name="lado1" id="lado1">

            <label for="lado2">Segundo Lado</label>
            <input type="number" name="lado2" id="lado2">

            <label for="lado3">Terceiro Lado</label>
            <input type="number" name="lado3" id="lado3">

            <div id="buttons">
                <button type="submit"> Confirmar</button>
                <button type="reset"> Limpar</button>
            </div>
        </form>

        <div id="div-resultado"></div>
    </div>
    <script src="q05.js"></script>
</body>
</html>
