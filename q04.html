<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="questions.css">
</head>
<body>

    <div id="div-form">
        <h2>4.Entrar com Nome, 3 notas de um aluno. Ache a média. Caso
            a média seja maior ou igual a 6, apresentar o texto
            Aprovado, caso contrário apresentar o texto Reprovado</h2>
        <hr>
        <form id="boletim">
            <label for="nome">Nome do Aluno</label>
            <input type="text" name="nome" id="nome">

            <label for="n1">Primeira Nota</label>
            <input type="number" name="n1" id="n1">

            <label for="n2">Segunda Nota</label>
            <input type="number" name="n2" id="n2">

            <label for="n3">Terceira Nota</label>
            <input type="number" name="n3" id="n3">

            <div id="buttons">
                <button type="submit"> Confirmar</button>
                <button type="reset"> Limpar</button>
            </div>
        </form>

        <div id="div-resultado"></div>
    </div>
    <script src="q04.js"></script>
</body>
</html>
